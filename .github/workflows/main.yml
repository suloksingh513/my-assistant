name: Android APK Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Organize Files into Android Structure
        run: |
          echo "Arranging files into correct Android layout..."
          mkdir -p app/src/main/java/com/privateai/assistant
          mkdir -p app/src/main/res
          
          # Move Java source files to package directory
          [ -f ConfigActivity.java ] && mv ConfigActivity.java app/src/main/java/com/privateai/assistant/ || true
          [ -f AssistantService.java ] && mv AssistantService.java app/src/main/java/com/privateai/assistant/ || true
          [ -f BootReceiver.java ] && mv BootReceiver.java app/src/main/java/com/privateai/assistant/ || true
          
          # Move Manifest file
          [ -f AndroidManifest.xml ] && mv AndroidManifest.xml app/src/main/ || true
          
          # Handle app-level build.gradle if named differently
          if [ -f app/build.gradle ]; then
            echo "app/build.gradle already exists"
          elif [ -f build.gradle ] && [ ! -f settings.gradle ]; then
            # If there's only one build.gradle uploaded directly
            mkdir -p app
            cp build.gradle app/build.gradle
          fi

      - name: Build APK with Gradle 8.5
        run: gradle assembleDebug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
