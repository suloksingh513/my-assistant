name: Android APK Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Auto-Generate Clean Android Project Structure
        run: |
          echo "Starting clean architecture generation..."
          
          # 1. Temporarily backup your core Java and Manifest files
          mkdir -p /tmp/backup_source
          [ -f ConfigActivity.java ] && cp ConfigActivity.java /tmp/backup_source/
          [ -f AssistantService.java ] && cp AssistantService.java /tmp/backup_source/
          [ -f BootReceiver.java ] && cp BootReceiver.java /tmp/backup_source/
          [ -f AndroidManifest.xml ] && cp AndroidManifest.xml /tmp/backup_source/
          
          # 2. Clear out the directory mess to avoid configuration clashes
          rm -rf *
          
          # 3. Create gradle.properties and enable AndroidX
          cat << 'EOF' > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          EOF
          
          # 4. Create fresh standard multi-module configuration files
          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "PrivateAIAssistant"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
              }
          }
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          # 5. Generate standard application module folders
          mkdir -p app/src/main/java/com/privateai/assistant
          mkdir -p app/src/main/res/values
          
          # 6. Create standard app build.gradle with correct dependencies
          cat << 'EOF' > app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.privateai.assistant'
              compileSdk 34
              defaultConfig {
                  applicationId "com.privateai.assistant"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
          }
          EOF

          # 7. Put a placeholder strings.xml to satisfy any resource constraints
          cat << 'EOF' > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">Private AI Assistant</string>
          </resources>
          EOF

          # 8. Restore your source files into their correct structural locations
          [ -f /tmp/backup_source/ConfigActivity.java ] && cp /tmp/backup_source/ConfigActivity.java app/src/main/java/com/privateai/assistant/
          [ -f /tmp/backup_source/AssistantService.java ] && cp /tmp/backup_source/AssistantService.java app/src/main/java/com/privateai/assistant/
          [ -f /tmp/backup_source/BootReceiver.java ] && cp /tmp/backup_source/BootReceiver.java app/src/main/java/com/privateai/assistant/
          [ -f /tmp/backup_source/AndroidManifest.xml ] && cp /tmp/backup_source/AndroidManifest.xml app/src/main/

      - name: Compile and Generate Android APK
        run: gradle :app:assembleDebug
        
      - name: Upload APK Package Destination
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
